name: docs-and-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Regenerate documentation
        run: |
          python scripts/scripts_generate_python_docs.py
          python scripts/scripts_generate_theory_docs.py
          python scripts/scripts_generate_docs_extras.py
          python scripts/scripts_generate_html_docs.py

      - name: Check for documentation drift
        run: |
          git diff --exit-code \
            -I '[Aa]uto-generated by .* from commit' \
            -I '[Gg]enerated by .* from commit' \
            -I 'commit date: ' \
            -I '"commit":' \
            -I '"commit_date":' \
            -I '"peak_sidelobe_db":' \
            -I '"scalloping_loss_db":' \
            -I '"enbw_bins":' \
            -I '"coherent_gain":'

      - name: Run test suite
        run: python -m unittest discover -s tests -p "test_*.py"
