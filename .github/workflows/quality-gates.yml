name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install coverage ruff mypy

      - name: Dependency sync gate
        run: |
          python scripts/scripts_check_dependency_sync.py

      - name: Lint (critical rules)
        run: |
          ruff check src/pvx src/pvxalgorithms scripts tests --select E9,F63,F7,F82

      - name: Type check (maintainer-critical modules)
        run: |
          mypy src/pvx/core/attribution.py scripts/scripts_apply_attribution.py

      - name: Coverage gate
        run: |
          coverage run -m unittest discover -s tests -p "test_*.py"
          coverage report --fail-under=45

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
