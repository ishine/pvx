name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Core test matrix across Python versions
  # --------------------------------------------------------------------------
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - os: macos-latest
            python-version: "3.12"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest coverage

      - name: Run tests
        run: |
          coverage run -m pytest tests/ -v --tb=short -x
          coverage report --fail-under=45

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .coverage

  # --------------------------------------------------------------------------
  # PyTorch GPU transforms (optional — separate job so core tests don't block)
  # --------------------------------------------------------------------------
  test-torch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install with PyTorch
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[torch]"
          python -m pip install pytest

      - name: Run GPU transform tests
        run: |
          python -m pytest tests/test_gpu_transforms.py tests/test_augment_transforms.py -v --tb=short

  # --------------------------------------------------------------------------
  # Lint + type-check
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: Ruff lint (critical rules)
        run: ruff check src/pvx src/pvxalgorithms scripts tests --select E9,F63,F7,F82

      - name: Type check
        run: mypy src/pvx/core/attribution.py scripts/scripts_apply_attribution.py

  # --------------------------------------------------------------------------
  # Package build verification
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and verify
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # --------------------------------------------------------------------------
  # Docs coverage gate
  # --------------------------------------------------------------------------
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest

      - name: Docs coverage tests
        run: python -m pytest tests/test_docs_coverage.py -v
