name: augment-benchmark-regression

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  augment-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run augmentation benchmark + gate
        run: |
          python benchmarks/run_augment_bench.py \
            --quick \
            --out-dir benchmarks/out_augment \
            --baseline benchmarks/baseline_augment_small.json \
            --gate \
            --gate-tolerance 0.30
      - name: Upload augmentation benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: augment-benchmark-report
          path: benchmarks/out_augment/
